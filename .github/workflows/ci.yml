name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: library
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Zig build check
        run: pnpm run build:zig

      - name: Zig tests
        run: pnpm run test:zig

      - name: JS typecheck
        run: pnpm typecheck

      - name: JS tests
        run: pnpm run test:js

      - name: Package build
        run: pnpm build

      - name: Demo typecheck
        run: pnpm run demo:typecheck

      - name: Demo build
        run: pnpm run demo:build
