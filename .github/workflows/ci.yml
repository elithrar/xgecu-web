name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: library
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Zig tests
        run: zig build test

      - name: JS typecheck
        run: pnpm typecheck

      - name: JS tests
        run: pnpm test

      - name: Package build
        run: pnpm build
